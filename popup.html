<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Güvenlik Analizi</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="popup-header">
        <div class="header-left">
          <div class="logo-icon">🛡️</div>
          <div>
            <h2 class="popup-title">Web Güvenlik Analizi</h2>
            <span class="subtitle">Güvenlik & Performans Analizi</span>
          </div>
        </div>
        <div id="change_theme" class="theme-toggle" title="Tema Değiştir">
          <span class="icon-moon">☾</span>
          <span class="icon-sun">☀</span>
        </div>
      </header>

      <div class="action-grid">
        <button id="analysis_button" class="btn-primary">
          <span class="icon">🔍</span> Analiz Et
        </button>
        <button id="performance_button" class="btn-secondary">
          <span class="icon">🚀</span> Performans Testi
        </button>
      </div>

      <div id="results">
        <div id="loading" style="display: none">
          <div class="loading-container">
            <div class="spinner"></div>
            <p>Sistem taranıyor...</p>
          </div>
        </div>
        <div id="results-content"></div>
      </div>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>

      <div class="secondary-actions">
        <button id="ai_button" class="btn-ai" disabled>
          <span class="sparkle">✨</span> AI Açıklamaları
        </button>

        <div id="explanation">
          <div id="loading-explanation" style="display: none">
            <div class="loading-container sm">
              <div class="spinner sm"></div>
              <p>Yapay zeka yanıtlıyor...</p>
            </div>
          </div>
          <div id="explanation-content"></div>
        </div>

        <button id="download_pdf" class="btn-outline" disabled>
          📥 PDF Raporu İndir
        </button>
      </div>

      <div class="history-section">
        <h3>Analiz Geçmişi</h3>

        <div id="filter" class="filter-box">
          <div class="filter-dates">
            <div class="input-group">
              <label>Başlangıç</label>
              <input type="date" id="start_date" />
            </div>
            <div class="input-group">
              <label>Bitiş</label>
              <input type="date" id="end_date" />
            </div>
          </div>

          <div class="filter-actions">
            <label class="type-select">
              <select id="type_filter">
                <option value="">Tümü</option>
                <option value="performance">Performans</option>
                <option value="security">Güvenlik</option>
              </select>
            </label>
            <div class="btn-group">
              <button id="filter_button" class="btn-small">Filtrele</button>
              <button id="reset_filter_button" class="btn-small btn-ghost">
                Sıfırla
              </button>
            </div>
          </div>
        </div>

        <div id="history"></div>
        <button id="delete_history" class="btn-danger">
          Tüm Geçmişi Temizle
        </button>
      </div>
    </div>

    <script src="scripts/chart.js"></script>
    <script src="libs/jspdf.umd.min.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
